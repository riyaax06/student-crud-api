<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - CRUD API</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #090d16;
            --surface-color: #121824;
            --surface-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --accent: #d946ef;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Ambient Glow Background Effects */
        .ambient-glow-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            top: -200px;
            left: -100px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(217, 70, 239, 0.08) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            position: relative;
        }

        /* Header Style */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-section h1 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        /* Action Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
            background: rgba(18, 24, 36, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            padding: 0.75rem 1rem;
            border-radius: 16px;
        }

        .search-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .search-wrapper svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            color: var(--text-main);
            font-family: var(--font-body);
            border-radius: 10px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.25rem;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.07);
            color: var(--text-main);
            border: 1px solid var(--surface-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* Student Grid Layout */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        /* Student Card styling */
        .student-card {
            background: linear-gradient(145deg, rgba(18, 24, 36, 0.8) 0%, rgba(13, 17, 28, 0.85) 100%);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(16px);
        }

        .student-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .student-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.25);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .student-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.25rem;
        }

        .student-id {
            background: rgba(99, 102, 241, 0.12);
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 8px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            font-family: var(--font-display);
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
        }

        .icon-btn-delete:hover {
            background: rgba(239, 68, 68, 0.12);
            color: var(--error);
        }

        .student-name {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .student-course-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 0.15rem;
        }

        .student-course {
            font-size: 0.95rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 9, 16, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            width: 100%;
            max-width: 460px;
            padding: 2rem;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-container {
            transform: scale(1);
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-family: var(--font-body);
            border-radius: 12px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .form-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        /* Toast Container */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 1000;
            pointer-events: none;
        }

        .toast {
            background: rgba(18, 24, 36, 0.9);
            border: 1px solid var(--surface-border);
            backdrop-filter: blur(12px);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success {
            border-left: 4px solid var(--success);
        }

        .toast-error {
            border-left: 4px solid var(--error);
        }

        .toast-icon {
            flex-shrink: 0;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background: rgba(18, 24, 36, 0.4);
            border: 1px dashed var(--surface-border);
            border-radius: 24px;
            text-align: center;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="container">
        <header>
            <div class="logo-section">
                <h1>Student Portal</h1>
                <p>Manage and track enrolled students via the Flask CRUD REST API</p>
            </div>
            <button class="btn btn-primary" id="open-add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                New Student
            </button>
        </header>

        <div class="controls">
            <div class="search-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" class="search-input" id="search-input" placeholder="Search students by name or course...">
            </div>
        </div>

        <div class="student-grid" id="student-grid">
            <!-- Dynamically populated -->
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="student-modal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Add New Student</h2>
            </div>
            <form id="student-form">
                <div class="form-group">
                    <label for="form-id" class="form-label">Student ID</label>
                    <input type="number" class="form-input" id="form-id" required min="1" placeholder="e.g. 101">
                </div>
                <div class="form-group">
                    <label for="form-name" class="form-label">Full Name</label>
                    <input type="text" class="form-input" id="form-name" required placeholder="e.g. Alice Smith">
                </div>
                <div class="form-group">
                    <label for="form-course" class="form-label">Course</label>
                    <input type="text" class="form-input" id="form-course" required placeholder="e.g. Computer Science">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="close-modal-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        const API_URL = '/students';
        let studentsList = [];
        let isEditMode = false;
        
        // Dom Elements
        const studentGrid = document.getElementById('student-grid');
        const searchInput = document.getElementById('search-input');
        const openAddBtn = document.getElementById('open-add-btn');
        const studentModal = document.getElementById('student-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const studentForm = document.getElementById('student-form');
        const modalTitle = document.getElementById('modal-title');
        
        const formId = document.getElementById('form-id');
        const formName = document.getElementById('form-name');
        const formCourse = document.getElementById('form-course');
        const toastContainer = document.getElementById('toast-container');

        // Load students on start
        window.addEventListener('DOMContentLoaded', fetchStudents);

        async function fetchStudents() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to load students');
                studentsList = await response.json();
                renderStudents(studentsList);
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function renderStudents(list) {
            studentGrid.innerHTML = '';
            
            if (list.length === 0) {
                studentGrid.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
                        </svg>
                        <h3>No students found</h3>
                        <p>${searchInput.value.trim() ? 'Try adjusting your search filter' : 'Get started by creating a new student record'}</p>
                    </div>
                `;
                return;
            }

            list.forEach(student => {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="student-id">ID: ${student.id}</span>
                        <div class="card-actions">
                            <button class="icon-btn" onclick="openEditModal(${student.id}, '${escapeHtml(student.name)}', '${escapeHtml(student.course)}')" title="Edit Student">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" />
                                </svg>
                            </button>
                            <button class="icon-btn icon-btn-delete" onclick="deleteStudent(${student.id})" title="Delete Student">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <h3 class="student-name">${escapeHtml(student.name)}</h3>
                    <div class="student-course-label">Course</div>
                    <div class="student-course">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color: var(--primary);">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                        </svg>
                        <span>${escapeHtml(student.course)}</span>
                    </div>
                `;
                studentGrid.appendChild(card);
            });
        }

        // Live Search Filter
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase().trim();
            const filtered = studentsList.filter(student => 
                student.name.toLowerCase().includes(query) || 
                student.course.toLowerCase().includes(query)
            );
            renderStudents(filtered);
        });

        // Modals opening/closing
        openAddBtn.addEventListener('click', () => {
            isEditMode = false;
            modalTitle.innerText = "Add New Student";
            studentForm.reset();
            formId.disabled = false;
            studentModal.classList.add('active');
        });

        function openEditModal(id, name, course) {
            isEditMode = true;
            modalTitle.innerText = "Edit Student";
            formId.value = id;
            formId.disabled = true; // Cannot edit student ID
            formName.value = name;
            formCourse.value = course;
            studentModal.classList.add('active');
        }

        function closeModal() {
            studentModal.classList.remove('active');
        }

        closeModalBtn.addEventListener('click', closeModal);

        // Submit form (Create / Update)
        studentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = parseInt(formId.value);
            const name = formName.value.trim();
            const course = formCourse.value.trim();

            if (isEditMode) {
                // PUT request
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, course })
                    });
                    const resData = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(resData.error || 'Failed to update student');
                    }

                    showToast('Student updated successfully!', 'success');
                    closeModal();
                    fetchStudents();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            } else {
                // POST request
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, name, course })
                    });
                    const resData = await response.json();

                    if (!response.ok) {
                        throw new Error(resData.error || 'Failed to add student');
                    }

                    showToast('Student created successfully!', 'success');
                    closeModal();
                    fetchStudents();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            }
        });

        // Delete student
        async function deleteStudent(id) {
            if (!confirm(`Are you sure you want to delete student with ID ${id}?`)) return;
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });
                const resData = await response.json();

                if (!response.ok) {
                    throw new Error(resData.error || 'Failed to delete student');
                }

                showToast('Student deleted successfully', 'success');
                fetchStudents();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Custom Toast system
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const iconSvg = type === 'success' ? 
                `<svg xmlns="http://www.w3.org/2000/svg" class="toast-icon" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="${varColor('--success')}">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                 </svg>` :
                `<svg xmlns="http://www.w3.org/2000/svg" class="toast-icon" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="${varColor('--error')}">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                 </svg>`;

            toast.innerHTML = `
                ${iconSvg}
                <span>${escapeHtml(message)}</span>
            `;
            
            toastContainer.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => {
                toast.classList.add('show');
            }, 50);

            // Auto remove
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function varColor(cssVarName) {
            return getComputedStyle(document.documentElement).getPropertyValue(cssVarName).trim();
        }

        // Utility to escape HTML
        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
